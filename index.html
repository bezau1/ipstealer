<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Visit Site</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 2rem;
      max-width: 380px;
      width: 100%;
      text-align: center;
    }

    h1 { font-size: 1.4rem; font-weight: 700; color: #111; margin-bottom: 0.4rem; }
    p  { font-size: 0.85rem; color: #888; margin-bottom: 1.5rem; }

    .go-btn {
      width: 100%;
      padding: 0.9rem;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .go-btn:hover { background: #4f46e5; }

    /* Warning box — hidden by default */
    .warning {
      display: none;
      margin-top: 1.2rem;
      background: #fffbeb;
      border: 1px solid #fcd34d;
      border-radius: 10px;
      padding: 1rem 1.2rem;
      text-align: left;
    }

    .warning.show { display: block; animation: slideDown 0.2s ease; }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .warning-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: #92400e;
      margin-bottom: 0.4rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .warning-text {
      font-size: 0.78rem;
      color: #78350f;
      line-height: 1.6;
      margin-bottom: 1rem;
    }

    .warning-url {
      font-size: 0.72rem;
      color: #6366f1;
      background: #f5f3ff;
      border-radius: 6px;
      padding: 0.4rem 0.6rem;
      margin-bottom: 1rem;
      word-break: break-all;
    }

    .warning-actions {
      display: flex;
      gap: 0.6rem;
    }

    .btn-cancel {
      flex: 1;
      padding: 0.6rem;
      background: #f5f5f5;
      border: none;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #555;
      cursor: pointer;
    }
    .btn-cancel:hover { background: #e5e5e5; }

    .btn-confirm {
      flex: 2;
      padding: 0.6rem;
      background: #f59e0b;
      border: none;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
    }
    .btn-confirm:hover { background: #d97706; }
  </style>
</head>
<body>

  <div class="card">
    <h1>Welcome</h1>
    <p>Click the button to visit the external site.</p>

    <button class="go-btn" onclick="showWarning()">Visit Site →</button>

    <div class="warning" id="warning">
      <div class="warning-title">⚠️ WARNING</div>
      <p class="warning-text">
        YOU ARE GONNA GET REDIRECTED TO AN IP-LOGGER THIS WEBSITE WAS MADE FOR EDUCATIONAL AND ILLUSTRATIVE PURPOSES! 
      </p>
      <div class="warning-url" id="warningUrl">https://www.example.com</div>
      <div class="warning-actions">
        <button class="btn-cancel" onclick="hideWarning()">Cancel</button>
        <button class="btn-confirm" onclick="doRedirect()">Continue →</button>
      </div>
    </div>
  </div>

  <script>
    const DESTINATION = "https://grabify.link/U8DMRV"; // ← change this

    function showWarning() {
      document.getElementById('warningUrl').textContent = DESTINATION;
      document.getElementById('warning').classList.add('show');
    }

    function hideWarning() {
      document.getElementById('warning').classList.remove('show');
    }

    function doRedirect() {
      window.open(DESTINATION, '_blank');
      hideWarning();
    }
  </script>

</body>
</html>
